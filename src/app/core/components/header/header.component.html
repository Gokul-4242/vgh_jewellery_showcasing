<header class="header glass" [class.menu-open]="isMenuOpen">
  <div class="logo-container" routerLink="/">
    <div class="logo-icon">
      <span class="material-symbols-outlined logo-diamond">diamond</span>
    </div>
    <h1 class="font-playfair logo-text">VGH Jewellers</h1>
  </div>

  <!-- Desktop Navigation -->
  <nav class="nav-links">
    <a *ngFor="let item of navItems" 
       [routerLink]="item.path" 
       routerLinkActive="active" 
       [routerLinkActiveOptions]="{exact: item.exact}">
      {{ item.label }}
    </a>
  </nav>

  <div class="actions">
    <div class="search-bar glass">
      <span class="material-symbols-outlined search-icon">search</span>
      <input type="text" placeholder="SEARCH..." class="search-input">
    </div>

    <!-- Grouped for better spacing control -->
    <div class="icon-group">
      <button class="icon-btn" routerLink="/cart" (click)="closeMenu()">
        <span class="material-symbols-outlined">shopping_bag</span>
      </button>
      <button class="icon-btn" routerLink="/auth" (click)="closeMenu()">
        <span class="material-symbols-outlined">account_circle</span>
      </button>
      <button class="menu-btn" (click)="toggleMenu()">
        <span class="material-symbols-outlined">{{ isMenuOpen ? 'close' : 'menu' }}</span>
      </button>
    </div>
  </div>

  <!-- Mobile Navigation Overlay -->
  <div class="mobile-menu-overlay glass" *ngIf="isMenuOpen" (click)="closeMenu()">
    <nav class="mobile-nav" (click)="$event.stopPropagation()">
      <div class="mobile-nav-header">
        <span class="menu-label font-playfair">NATIVE NAVIGATION</span>
        <div class="menu-divider"></div>
      </div>
      <a *ngFor="let item of navItems" 
         [routerLink]="item.path" 
         routerLinkActive="active-mobile" 
         [routerLinkActiveOptions]="{exact: item.exact}"
         (click)="closeMenu()"
         class="mobile-nav-item">
        <span class="nav-number">0{{ navItems.indexOf(item) + 1 }}</span>
        <span class="nav-label">{{ item.label }}</span>
        <span class="material-symbols-outlined nav-arrow">trending_flat</span>
      </a>
    </nav>
  </div>
</header>
