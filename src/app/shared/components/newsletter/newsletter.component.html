<section class="newsletter-section">
  <div class="newsletter-glow-bg"></div>
  <div class="newsletter-card glass">
    <h2 class="font-playfair newsletter-title">{{ title }}</h2>
    <p class="newsletter-desc">{{ description }}</p>
    <form class="newsletter-form">
      <input class="aura-input newsletter-input" [placeholder]="placeholder" type="email"/>
      <button class="btn-primary gold-glow newsletter-btn" type="submit">
        {{ buttonText }}
      </button>
    </form>
    <p class="newsletter-footer">{{ footerText }}</p>
  </div>
</section>
