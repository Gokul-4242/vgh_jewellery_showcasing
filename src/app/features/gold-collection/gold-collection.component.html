<section class="gold-hero">
  <div class="hero-bg">
    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBolnY1FuSX0sYvlJEYlJIll_XMNcxP55QpakLMiNw0oAgze4XYfxT0U-9nkkifpgVqZdboV9N4MMcv418M1-mPS-Eu2rAe1tlljUzh4urW0WYV6tp7bYjMHOsspk8shRIxXwg0OAfuRYuYs3YqksNu1YESeZZLAcKy276f4ZawGJ_GmddYkeunLEzfhT3zE_DuOO9mS7RhkBsdUULFS7U0vJtJ5TdcGCh3skyXHJUPFWdR9JHC7nLs99jt4Sq5FitmG3nW8O72fSnr" 
         alt="The Gold Standard" class="hero-img">
    <div class="hero-overlay"></div>
  </div>
  <div class="hero-content glass hero-content-vgh animate-fade-up">
    <h1 class="font-playfair hero-title-vgh">The Gold Standard</h1>
    <p class="hero-desc-vgh">Handcrafted gold jewellery with BIS hallmark certification and custom design options.</p>
    <button (click)="scrollToProducts()" class="btn-primary gold-glow hero-btn-vgh">Explore Gold Jewellery</button>
  </div>
</section>

<!-- Main Gallery -->
<main id="gold-products" class="gallery-container">
    <!-- Content Area -->
    <div class="content-area">
      <header class="content-header animate-fade-up">
        <div class="header-text">
          <h3 class="font-playfair section-subtitle">Available Gold Jewellery</h3>
          <p class="stats uppercase tracking-widest">Showing available handcrafted designs</p>
        </div>
        <div class="rate-display-aura animate-fade-in">
          <div class="rate-card-premium glass">
            <div class="rate-header">
              <span class="material-symbols-outlined rate-icon">trending_up</span>
              <span class="rate-label uppercase tracking-widest">Today's Gold Rate</span>
            </div>
            <div class="rate-values">
              <div class="rate-item">
                <span class="purity">24K</span>
                <span class="price">₹ 7,850</span>
              </div>
              <div class="divider"></div>
              <div class="rate-item">
                <span class="purity">22K</span>
                <span class="price">₹ 7,200</span>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- Gallery Control Bar & Sidebar (Repositioned after rate) -->
      <div class="mobile-filter-bar animate-fade-up">
        <button class="filter-toggle-btn" (click)="toggleFilters()">
          <span class="material-symbols-outlined">{{ isFiltersVisible ? 'close' : 'tune' }}</span>
          <span class="btn-label uppercase tracking-widest">{{ isFiltersVisible ? 'Close Filters' : 'Refine Selection' }}</span>
        </button>
      </div>

      <div class="sidebar-wrapper" [class.mobile-active]="isFiltersVisible">
        <app-filters [jewelryTypes]="jewelryTypes" [purityLevels]="purityLevels" (filterChange)="onFilterChange($event)"></app-filters>
      </div>

      <!-- Product Grid -->
      <div class="product-grid">
        <app-product-card 
          *ngFor="let product of filteredProducts"
          [id]="product.id"
          [name]="product.name"
          [price]="product.price"
          [weight]="product.weight"
          [category]="product.category"
          [imageSrc]="product.imageSrc"
          [imageAlt]="product.imageAlt">
        </app-product-card>
      </div>

       <!-- Discovery -->
      <div class="discovery-footer">
        <button class="discover-btn uppercase tracking-[0.3em] gold-glow">
          Discover More Pieces
        </button>
      </div>
    </div>
</main>

<!-- Unified Newsletter and Footer handled by App Shell -->
