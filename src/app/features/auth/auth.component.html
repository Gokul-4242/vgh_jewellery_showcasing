<div class="auth-page bg-mesh">
  <!-- Animated Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Main Content -->
  <main class="auth-main">
    <div class="auth-card">
      <div class="card-content">

        <!-- Login Form -->
        <div class="form-container" [class.active-form]="isLoginMode" [class.hidden-form]="!isLoginMode">
          <div class="form-header">
            <h1 class="form-title stagger-in" style="animation-delay: 0.1s;">Welcome Back</h1>
            <p class="form-subtitle stagger-in" style="animation-delay: 0.2s;">Please enter your credentials to access your premium vault.</p>
          </div>

          <form (ngSubmit)="onLoginSubmit()" class="auth-form">
            <div class="field-group stagger-in" style="animation-delay: 0.3s;">
              <label for="loginEmail" class="field-label">Email Address</label>
              <input type="email" id="loginEmail" class="aura-input" placeholder="name@vghjewellers.com" required>
            </div>

            <div class="field-group stagger-in" style="animation-delay: 0.4s;">
              <label for="loginPassword" class="field-label">Password</label>
              <div class="password-wrapper">
                <input type="password" id="loginPassword" class="aura-input" placeholder="••••••••" required>
                <button type="button" class="password-toggle">
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </div>
            </div>

            <div class="remember-row stagger-in" style="animation-delay: 0.5s;">
              <input type="checkbox" id="remember" class="form-checkbox">
              <label for="remember" class="checkbox-label">Remember device for 30 days</label>
            </div>

            <button type="submit" class="auth-btn stagger-in" style="animation-delay: 0.6s;">
              Access Account
            </button>
          </form>

          <div class="form-footer stagger-in" style="animation-delay: 0.7s;">
            <p>New to VGH Jewellers? <button class="toggle-link" (click)="toggleForm()">Sign Up</button></p>
          </div>
        </div>

        <!-- Sign Up Form -->
        <div class="form-container" [class.active-form]="!isLoginMode" [class.hidden-form]="isLoginMode">
          <div class="form-header">
            <h2 class="form-title">Join VGH Jewellers</h2>
            <p class="form-subtitle">Enter the inner circle of luxury living.</p>
          </div>

          <form (ngSubmit)="onSignupSubmit()" class="auth-form">
            <div class="field-group">
              <label for="fullName" class="field-label">Full Name</label>
              <div class="input-icon-wrapper">
                <span class="material-symbols-outlined input-icon">person</span>
                <input type="text" id="fullName" class="aura-input icon-input" placeholder="Alexander Thorne" required>
              </div>
            </div>

            <div class="field-group">
              <label for="signupEmail" class="field-label">Email Address</label>
              <div class="input-icon-wrapper">
                <span class="material-symbols-outlined input-icon">mail</span>
                <input type="email" id="signupEmail" class="aura-input icon-input" placeholder="alexander@vgh.luxury" required>
              </div>
            </div>

            <div class="two-col-grid">
              <div class="field-group">
                <label for="signupPassword" class="field-label">Password</label>
                <input type="password" id="signupPassword" class="aura-input" placeholder="••••••••" required>
              </div>
              <div class="field-group">
                <label for="confirmPassword" class="field-label">Confirm</label>
                <input type="password" id="confirmPassword" class="aura-input" placeholder="••••••••" required>
              </div>
            </div>

            <div class="terms-group">
              <input type="checkbox" id="terms" class="form-checkbox">
              <label for="terms" class="terms-label">
                I agree to the <a class="gold-link" href="#">Terms of Excellence</a> and <a class="gold-link" href="#">Privacy Policy</a>.
              </label>
            </div>

            <button type="submit" class="auth-btn">
              Create Account
            </button>
          </form>

          <div class="form-footer">
            <p>Already have an account? <button class="toggle-link" (click)="toggleForm()">Login</button></p>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>
