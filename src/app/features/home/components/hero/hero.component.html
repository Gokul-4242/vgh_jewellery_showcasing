<section class="hero-section">
  <div class="hero-bg">
    <img [alt]="imageAlt" class="hero-img" [src]="imageSrc"/>
    <div class="hero-overlay"></div>
  </div>
  <div class="hero-content glass hero-content-vgh">
    <h2 class="font-playfair hero-title-vgh">{{ title }}</h2>
    <p class="hero-desc-vgh">{{ subtitle }}</p>
    <button class="btn-primary gold-glow hero-btn-vgh">
      {{ buttonText }}
    </button>
  </div>
</section>
